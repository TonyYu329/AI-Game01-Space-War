<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Space War - 太空战机</title>

    <!-- Google Fonts：科幻风格字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- ============================================================
         === CSS IMPORTS =======================================
         ============================================================ -->
    <link rel="stylesheet" href="./css/ui/merged.css?v=3.2.1">

    <!-- ============================================================
         === JAVASCRIPT IMPORTS ===============================
         ============================================================ -->
    <script src="./js/index_cjs.js?v=3.2.1"></script>
</head>
<body>

    <!-- ============================================================
         === GAME CANVAS =======================================
         ============================================================ -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- ============================================================
         === UI CONTAINER ======================================
         ============================================================ -->
    <div class="game-ui">
        
        <!-- HUD (Heads-Up Display) -->
        <div class="game-hud" id="hudContainer"></div>
        
        <!-- 开始界面覆盖层 -->
        <div class="start-screen" id="startScreen">
            <h1 class="overlay-title">Space War</h1>
            <p class="overlay-subtitle">键盘方向键/WASD 移动 · J/左键射击 · K/右键导弹</p>
            <button class="game-button" id="startButton">开始游戏</button>
            <span class="version-info">v3.2.1</span>
        </div>
        
        <!-- Game Over Overlay -->
        <div class="game-over-screen" id="gameOverScreen">
            <h1 class="overlay-title">GAME OVER</h1>
            <div class="overlay-subtitle"></div>
            <button class="game-button" id="restartButton">再玩一次</button>
        </div>

    </div>

    <!-- ============================================================
         === 移动端控制按钮（子弹 + 导弹） ====================
         ============================================================ -->
    <div class="mobile-controls" id="mobileControls">
        <button class="mobile-btn bullet-btn" id="btnBullet">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M13 2L4 14h5l-2 8 10-12h-5z" fill="#ffdd44" stroke="#ffaa00" stroke-width="0.5"/>
            </svg>
        </button>
        <button class="mobile-btn missile-btn" id="btnMissile">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 2l-5 9h3.5L9 21l9-11h-4.5L16 2z" fill="#ff6622" stroke="#ff4400" stroke-width="0.5"/>
            </svg>
        </button>
    </div>

    <!-- ============================================================
         === BUTTON EVENT BINDING =============================
         ============================================================ -->
    <script>
        // Bind button events after DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[HTML] DOM ready, binding buttons...');
            
            // Start button
            var startBtn = document.getElementById('startButton');
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    console.log('[HTML] Start button clicked');
                    if (window.startGame) {
                        window.startGame();
                    } else {
                        console.error('[HTML] startGame not found!');
                    }
                });
            }
            
            // Restart button
            var restartBtn = document.getElementById('restartButton');
            if (restartBtn) {
                restartBtn.addEventListener('click', function() {
                    console.log('[HTML] Restart button clicked');
                    if (window.resetGame) {
                        window.resetGame();
                    } else {
                        console.error('[HTML] resetGame not found!');
                    }
                });
            }
        });
    </script>
</body>
</html>
